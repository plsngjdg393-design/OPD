<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Сборник Скидок и Акций</title>
    <style>
        :root { --primary: #e74c3c; --dark: #333; --shadow: 0 4px 6px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; color: var(--dark); padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.95em; }
        .controls { background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .stores { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
        .stores button { padding: 8px 16px; border: none; background: #eee; cursor: pointer; border-radius: 20px; font-weight: 500; transition: 0.2s; }
        .stores button:hover { background: #ddd; }
        .stores button.active { background: var(--primary); color: white; }
        .deals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .deal-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); transition: transform 0.2s; position: relative; }
        .deal-card:hover { transform: translateY(-3px); }
        .deal-store { position: absolute; top: 10px; right: 10px; font-size: 0.75em; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; color: #555; }
        .deal-title { font-size: 1.2em; margin-bottom: 8px; font-weight: bold; }
        .deal-discount { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        .empty-msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: #888; background: white; border-radius: 12px; box-shadow: var(--shadow); }
        footer { text-align: center; margin-top: 50px; color: #888; font-size: 0.85em; }
    </style>
</head>
<body>
<header>
    <h1>🔥 Сборник Скидок и Акций</h1>
    <p class="subtitle">Автоматический сбор акций с разных магазинов</p>
</header>

<div class="controls">
    <div class="stores" id="storeTabs">
        <button class="active" data-store="all">Все магазины</button>
        <button data-store="magnit">🛒 Магнит</button>
        <button data-store="pyaterochka">🛒 Пятёрочка</button>
        <button data-store="dns">🖥️ DNS</button>
    </div>
</div>

<div class="deals-grid" id="dealsList">
    <div class="empty-msg">⏳ Загрузка акций...</div>
</div>

<footer>© 2026 Проект по дисциплине «Основы предметной деятельности»<br>Автоматический сбор данных с веб-сайтов</footer>
<script src="script.js"></script>
</body>
</html>
