name: Update Discounts Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов: в 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:       # Ручной запуск кнопкой в GitHub Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Разрешение на пуш изменений в репозиторий

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 🕷️ Run Magnit Parser
        run: python parser_magnit.py

      - name: 💾 Commit & Push if data.json changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # Коммитим только если есть изменения
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: new Magnit deals $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ Данные обновлены и запушены"
          else
            echo "ℹ️ Изменений в data.json нет, пуш не требуется"
          fi